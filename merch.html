   .merch-container {
    width: 100%;
    min-height: 100vh;
    background-color: black;
    color: white;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 50px;
    padding: 150px 50px 50px;
    box-sizing: border-box;
    text-align: center;
}

.merch-item img {
    width: 100%;
    max-width: 350px;
    height: auto;
}

.merch-item h2 {
    font-family: 'GFS Didot', serif;
    font-size: 18pt;
    margin: 20px 0;
}

.merch-item a {
    color: white;
    text-decoration: none;
    border: 1px solid white;
    padding: 10px 30px;
    font-family: 'GFS Didot', serif;
    display: inline-block;
}

.merch-item a:hover {
    background-color: white;
    color: black;
}
